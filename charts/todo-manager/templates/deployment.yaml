apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todo-manager.fullname" . }}
  labels:
    {{- include "todo-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "todo-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "todo-manager.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "todo-manager.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: TODO_MANAGER_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-manager.secretName" . }}
                  key: session-secret
            {{- if or (eq .Values.database.mode "bundled") (eq .Values.database.mode "external") }}
            - name: TODO_MANAGER_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-manager.secretName" . }}
                  key: db-dsn
            {{- end }}
            {{- if eq .Values.auth.mode "oidc" }}
            - name: TODO_MANAGER_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-manager.secretName" . }}
                  key: oidc-client-secret
            {{- end }}
            {{- if .Values.llm.enabled }}
            - name: TODO_MANAGER_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "todo-manager.secretName" . }}
                  key: llm-api-key
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe.spec | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe.spec | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if eq .Values.database.mode "sqlite" }}
            - name: data
              mountPath: {{ dir .Values.database.sqlite.path }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "todo-manager.configmapName" . }}
        {{- if eq .Values.database.mode "sqlite" }}
        - name: data
          {{- if .Values.database.sqlite.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "todo-manager.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
